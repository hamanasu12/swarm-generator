<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Swarm URL → I'm at 文生成</title>

  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 860px;
      margin: 40px auto;
      line-height: 1.6;
    }

    input {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      box-sizing: border-box;
    }

    button {
      margin-top: 12px;
      margin-right: 8px;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }

    .status {
      margin-top: 12px;
      color: #555;
    }

    .share-box {
      margin-top: 20px;
      padding: 16px;
      background: #eef7ff;
      border: 1px solid #b8dfff;
      display: none;
    }

    .share-text {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 12px;
      word-break: break-word;
      white-space: pre-wrap;
    }

    .candidate-box {
      margin-top: 24px;
      display: none;
    }

    .candidate {
      border: 1px solid #ddd;
      padding: 12px;
      margin-top: 10px;
      background: #fafafa;
    }

    .candidate-title {
      font-weight: bold;
      font-size: 16px;
    }

    .candidate-address {
      color: #555;
      font-size: 14px;
      margin-top: 4px;
      word-break: break-word;
    }

    .candidate-meta {
      color: #777;
      font-size: 13px;
      margin-top: 4px;
    }

    pre {
      margin-top: 20px;
      padding: 16px;
      background: #f4f4f4;
      border: 1px solid #ddd;
      white-space: pre-wrap;
      word-break: break-all;
    }
  </style>
</head>

<body>

  <h2>Swarm URL → I'm at 文生成</h2>

  <p>
    SwarmのチェックインURL、またはURLを含む文章を入力すると、
    位置情報を取得し、昔ながらの共有文を生成します。
  </p>

  <input
    id="url"
    placeholder="SwarmのURLまたはURLを含む文章を入力"
  >

  <button id="fetchButton" onclick="run()">取得</button>
  <button onclick="clearForm()">クリア</button>

  <div id="status" class="status"></div>

  <div id="shareBox" class="share-box">
    <div id="shareText" class="share-text"></div>
    <button id="copyButton" onclick="copyShareText()">コピー</button>
  </div>

  <div id="candidateBox" class="candidate-box">
    <h3>そのほかの候補</h3>
    <div id="candidateList"></div>
    <button id="googleButton" onclick="searchWithGoogle()" style="display:none;">
      Nominatimに良い候補がないのでGoogleで検索
    </button>
  </div>

  <pre id="out">ここにJSON結果が表示されます</pre>

  <script>
    const urlInput = document.getElementById("url");
    const fetchButton = document.getElementById("fetchButton");
    const status = document.getElementById("status");
    const candidateBox = document.getElementById("candidateBox");
    const candidateList = document.getElementById("candidateList");
    const googleButton = document.getElementById("googleButton");
    const shareBox = document.getElementById("shareBox");
    const shareText = document.getElementById("shareText");
    const copyButton = document.getElementById("copyButton");
    const out = document.getElementById("out");

    let currentSwarmUrl = "";
    let currentLocationHint = "";
    let latestData = null;

    urlInput.addEventListener("keydown", function(event) {
      if (event.key === "Enter") {
        event.preventDefault();
        run();
      }
    });

    function extractSwarmUrl(text) {
      const match = text.match(
        /https?:\/\/(?:ja\.)?swarmapp\.com\/user\/\d+\/checkin\/[A-Za-z0-9]+(?:\?[^ \n\r\t、。]*)?/
      );
      return match ? match[0] : null;
    }

    function extractLocationHint(text) {
      const match = text.match(/、([^、。]+?)にいました/);
      return match ? match[1].trim() : "";
    }

    async function fetchCandidates(provider) {
      let apiUrl =
        "/api?url=" +
        encodeURIComponent(currentSwarmUrl) +
        "&provider=" +
        encodeURIComponent(provider);

      if (currentLocationHint) {
        apiUrl += "&hint=" + encodeURIComponent(currentLocationHint);
      }

      const res = await fetch(apiUrl);
      return await res.json();
    }

    async function run() {
      const inputText = urlInput.value.trim();

      if (!inputText) {
        out.textContent = "URLを入力してください。";
        return;
      }

      const extractedUrl = extractSwarmUrl(inputText);

      if (!extractedUrl) {
        out.textContent = "SwarmのチェックインURLが見つかりませんでした。";
        return;
      }

      currentSwarmUrl = extractedUrl;
      currentLocationHint = extractLocationHint(inputText);

      resetResult();

      status.textContent = currentLocationHint
        ? `Nominatimで候補を取得中...（補助キーワード: ${currentLocationHint}）`
        : "Nominatimで候補を取得中...";

      fetchButton.disabled = true;

      try {
        const data = await fetchCandidates("nominatim");
        latestData = data;

        status.textContent = data.candidates?.length
          ? `候補を取得しました：${data.provider}`
          : "Nominatimでは候補が見つかりませんでした。";

        renderPrimaryCandidate(data);
        renderOtherCandidates(data);

        out.textContent = JSON.stringify(data, null, 2);

      } catch (e) {
        out.textContent = "エラーが発生しました: " + e.message;
      } finally {
        fetchButton.disabled = false;
      }
    }

    async function searchWithGoogle() {
      if (!currentSwarmUrl) return;

      resetShareOnly();

      status.textContent = currentLocationHint
        ? `Googleで候補を取得中...（補助キーワード: ${currentLocationHint}）`
        : "Googleで候補を取得中...";

      googleButton.disabled = true;

      try {
        const data = await fetchCandidates("google");
        latestData = data;

        status.textContent = data.candidates?.length
          ? `候補を取得しました：${data.provider}`
          : "Googleでも候補が見つかりませんでした。";

        renderPrimaryCandidate(data);
        renderOtherCandidates(data);

        out.textContent = JSON.stringify(data, null, 2);

      } catch (e) {
        out.textContent = "エラーが発生しました: " + e.message;
      } finally {
        googleButton.disabled = false;
      }
    }

    function renderPrimaryCandidate(data) {
      if (!data.candidates || data.candidates.length === 0) {
        shareBox.style.display = "none";
        shareText.textContent = "";
        copyButton.textContent = "コピー";
        return;
      }

      const primary = data.candidates[0];

      shareText.textContent = primary.shareText;
      shareBox.style.display = "block";
      copyButton.textContent = "コピー";

      status.textContent =
        `共有文を生成しました：${primary.provider} を使用`;
    }

    function renderOtherCandidates(data) {
      candidateList.innerHTML = "";

      if (!data.candidates || data.candidates.length <= 1) {
        candidateBox.style.display = "block";
        candidateList.innerHTML = "<p>そのほかの候補はありません。</p>";

        if (data.provider === "nominatim") {
          googleButton.style.display = "inline-block";
        } else {
          googleButton.style.display = "none";
        }

        return;
      }

      candidateBox.style.display = "block";

      const others = data.candidates.slice(1);

      others.forEach((candidate, index) => {
        const div = document.createElement("div");
        div.className = "candidate";

        const candidateName =
          candidate.search_query ||
          candidate.display_name_for_user ||
          candidate.venue ||
          "候補";

        const candidateAddress =
          candidate.formatted_address ||
          candidate.label ||
          "";

        div.innerHTML = `
          <div class="candidate-title">
            ${index + 2}. ${candidateName}
          </div>
          <div class="candidate-address">
            ${candidateAddress}
          </div>
          <div class="candidate-meta">
            ${candidate.city || ""} ${candidate.state || ""}
            / ${candidate.provider}
          </div>
        `;

        const button = document.createElement("button");
        button.textContent = "この候補で作成";
        button.onclick = function() {
          selectCandidate(candidate);
        };

        div.appendChild(button);
        candidateList.appendChild(div);
      });

      if (data.provider === "nominatim") {
        googleButton.style.display = "inline-block";
      } else {
        googleButton.style.display = "none";
      }
    }

    function selectCandidate(candidate) {
      shareText.textContent = candidate.shareText;
      shareBox.style.display = "block";

      status.textContent =
        `共有文を生成しました：${candidate.provider} を使用`;

      out.textContent = JSON.stringify(candidate, null, 2);

      copyButton.textContent = "コピー";
    }

    async function copyShareText() {
      const text = shareText.textContent;

      if (!text) return;

      try {
        await navigator.clipboard.writeText(text);
        copyButton.textContent = "コピーしました";
        setTimeout(() => {
          copyButton.textContent = "コピー";
        }, 1500);
      } catch (e) {
        copyButton.textContent = "コピー失敗";
        setTimeout(() => {
          copyButton.textContent = "コピー";
        }, 1500);
      }
    }

    function resetResult() {
      status.textContent = "";
      candidateBox.style.display = "none";
      candidateList.innerHTML = "";
      googleButton.style.display = "none";
      resetShareOnly();
      out.textContent = "";
    }

    function resetShareOnly() {
      shareBox.style.display = "none";
      shareText.textContent = "";
      copyButton.textContent = "コピー";
    }

    function clearForm() {
      urlInput.value = "";
      currentSwarmUrl = "";
      currentLocationHint = "";
      latestData = null;

      status.textContent = "";
      candidateBox.style.display = "none";
      candidateList.innerHTML = "";
      googleButton.style.display = "none";

      shareBox.style.display = "none";
      shareText.textContent = "";

      out.textContent = "ここにJSON結果が表示されます";
      copyButton.textContent = "コピー";

      urlInput.focus();
    }
  </script>

</body>
</html>
