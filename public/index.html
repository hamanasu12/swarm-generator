<!DOCTYPE html>

<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Swarm URL → I'm at 文生成</title>

  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 820px;
      margin: 40px auto;
      line-height: 1.6;
    }

    input {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      box-sizing: border-box;
    }

    button {
      margin-top: 12px;
      margin-right: 8px;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }

    .share-box {
      margin-top: 20px;
      padding: 16px;
      background: #eef7ff;
      border: 1px solid #b8dfff;
      display: none;
    }

    .share-text {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 12px;
      word-break: break-word;
    }

    .copy-button {
      padding: 8px 16px;
      font-size: 14px;
    }

    .status {
      margin-top: 12px;
      color: #555;
    }

    pre {
      margin-top: 20px;
      padding: 16px;
      background: #f4f4f4;
      border: 1px solid #ddd;
      white-space: pre-wrap;
      word-break: break-all;
    }
  </style>

</head>

<body>

  <h2>Swarm URL → I'm at 文生成</h2>

  <p>
    SwarmのチェックインURLを入力すると、venue名・位置情報を取得し、
    昔ながらの共有文を生成します。
  </p>

<input
id="url"
placeholder="SwarmのURLまたはURLを含む文章を入力"

>

<button id="fetchButton" onclick="run()">取得</button> <button id="clearButton" onclick="clearForm()">クリア</button>

  <div id="status" class="status"></div>

  <div id="shareBox" class="share-box">
    <div id="shareText" class="share-text"></div>
    <button
      id="copyButton"
      class="copy-button"
      onclick="copyShareText()">
      コピー
    </button>
  </div>

  <pre id="out">ここにJSON結果が表示されます</pre>

  <script>

    const urlInput = document.getElementById("url");
    const fetchButton = document.getElementById("fetchButton");
    const out = document.getElementById("out");
    const shareBox = document.getElementById("shareBox");
    const shareText = document.getElementById("shareText");
    const copyButton = document.getElementById("copyButton");
    const status = document.getElementById("status");

    urlInput.addEventListener("keydown", function(event) {
      if (event.key === "Enter") {
        event.preventDefault();
        run();
      }
    });

    function extractSwarmUrl(text) {
      const match = text.match(
        /https?:\/\/(?:ja\.)?swarmapp\.com\/user\/\d+\/checkin\/[A-Za-z0-9]+(?:\?[^ \n\r\t、。]*)?/
      );

      return match ? match[0] : null;
    }

    async function run() {

      const inputText = urlInput.value.trim();

      if (!inputText) {
        status.textContent = "";
        shareBox.style.display = "none";
        out.textContent = "URLを入力してください。";
        return;
      }

      const url = extractSwarmUrl(inputText);

      if (!url) {
        status.textContent = "";
        shareBox.style.display = "none";
        out.textContent = "SwarmのチェックインURLが見つかりませんでした。";
        return;
      }

      status.textContent = "取得中...";
      shareBox.style.display = "none";
      shareText.textContent = "";
      out.textContent = "";

      fetchButton.disabled = true;
      copyButton.textContent = "コピー";

      try {

        const res =
          await fetch("/api?url=" + encodeURIComponent(url));

        const data = await res.json();

        if (data.provider) {
          status.textContent =
            `取得完了：${data.provider} を使用`;
        } else {
          status.textContent = "取得完了";
        }

        if (data.shareText) {
          shareText.textContent = data.shareText;
          shareBox.style.display = "block";
        }
        else if (data.error) {
          shareText.textContent =
            "共有文を生成できませんでした。";

          shareBox.style.display = "block";
        }

        out.textContent =
          JSON.stringify(data, null, 2);

      }
      catch (e) {

        status.textContent = "";
        shareBox.style.display = "none";

        out.textContent =
          "エラーが発生しました: " + e.message;

      }
      finally {
        fetchButton.disabled = false;
      }
    }

    async function copyShareText() {

      const text = shareText.textContent;

      if (
        !text ||
        text === "共有文を生成できませんでした。"
      ) {
        return;
      }

      try {

        await navigator.clipboard.writeText(text);

        copyButton.textContent = "コピーしました";

        setTimeout(() => {
          copyButton.textContent = "コピー";
        }, 1500);

      }
      catch (e) {

        copyButton.textContent = "コピー失敗";

        setTimeout(() => {
          copyButton.textContent = "コピー";
        }, 1500);

      }
    }

    function clearForm() {

      urlInput.value = "";

      status.textContent = "";

      shareBox.style.display = "none";
      shareText.textContent = "";

      out.textContent =
        "ここにJSON結果が表示されます";

      copyButton.textContent = "コピー";

      urlInput.focus();
    }

  </script>

</body>
</html>
